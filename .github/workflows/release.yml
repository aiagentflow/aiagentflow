name: Release

# Step 1 of 2: bump version on a branch and open a PR.
# Step 2 is handled by tag-on-merge.yml — it tags + releases when this PR lands on main.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Run checks
        run: |
          npm run typecheck
          npm run build
          npm test

      - name: Bump version
        id: bump
        run: |
          OLD=$(node -p "require('./package.json').version")
          npm version ${{ inputs.bump }} --no-git-tag-version
          NEW=$(node -p "require('./package.json').version")
          echo "old=$OLD" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT

      - name: Update version in CLI
        run: |
          sed -i "s/\.version('${{ steps.bump.outputs.old }}')/\.version('${{ steps.bump.outputs.new }}')/" src/cli/index.ts

      - name: Push branch and open PR
        env:
          # Use RELEASE_PAT so the PR creation fires the pull_request event
          # and triggers CI. GITHUB_TOKEN-created events are blocked from
          # triggering downstream workflows (GitHub security restriction).
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-v${{ steps.bump.outputs.new }}"
          # Delete stale remote branch if it exists (e.g. from a previously
          # closed bump PR) so the push below never gets rejected.
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add package.json package-lock.json src/cli/index.ts
          git commit -m "Bump version to ${{ steps.bump.outputs.new }}"
          git push origin "$BRANCH"
          gh pr create \
            --title "Bump version to ${{ steps.bump.outputs.new }}" \
            --body "Automated version bump from \`${{ steps.bump.outputs.old }}\` to \`${{ steps.bump.outputs.new }}\`. Merging this PR will trigger tag creation and npm publish." \
            --base main \
            --head "$BRANCH"
